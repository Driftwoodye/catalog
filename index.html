<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driftwood Garden</title>
<style>
:root{--line:#26354f;--text:#e5e7eb;--muted:#94a3b8;--green:#34d399;--amber:#fbbf24}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#15382e 0,#0b1220 35%,#07101d 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{background:rgba(7,16,29,.94);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}.wrap{max-width:1280px;margin:0 auto;padding:8px 10px}h1{margin:0 0 6px;color:var(--green);font-size:clamp(18px,2.2vw,24px);line-height:1}.tabs,.controls{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.legend{margin-top:6px;color:#cbd5e1;font-size:12px;line-height:1.35;background:rgba(15,23,42,.75);border:1px solid rgba(38,53,79,.8);border-radius:10px;padding:7px 9px}button,input,select{background:#0f172a;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:6px 8px;font-size:13px}button{cursor:pointer}.tab.active{border-color:var(--green);color:var(--green);background:rgba(6,78,59,.35)}input{min-width:min(320px,100%)}main{max-width:1280px;margin:0 auto;padding:14px 10px 60px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}.card{background:linear-gradient(180deg,rgba(17,24,39,.97),rgba(15,23,42,.97));border:1px solid var(--line);border-radius:18px;overflow:hidden;min-height:315px;display:flex;flex-direction:column;cursor:pointer}.card:hover{border-color:#3f567a}.card-image,.thumb-placeholder{height:178px;background:#0b1220;border-bottom:1px solid rgba(38,53,79,.8)}.card-image img{display:block;width:100%;height:100%;object-fit:cover}.thumb-placeholder{display:flex;align-items:center;justify-content:center;padding:14px;text-align:center;color:#7c8aa5;font-size:12px;background:linear-gradient(135deg,rgba(21,56,46,.55),rgba(11,18,32,.95))}.body{padding:15px;display:flex;flex-direction:column;gap:12px;flex:1}.top{display:flex;justify-content:space-between;gap:10px}.badge{font-size:11px;border:1px solid var(--line);background:#0b1220;border-radius:999px;padding:6px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.family{color:var(--green);border-color:#14532d;background:rgba(6,78,59,.35)}.priority{color:var(--amber);border-color:#78350f;background:rgba(120,53,15,.25)}.name{font-size:20px;font-weight:800;font-style:italic;line-height:1.15}.common{color:var(--muted);font-size:13px;margin-top:3px;line-height:1.35}.notes{background:#0b1220;border:1px solid rgba(38,53,79,.8);border-radius:12px;padding:10px;font-size:12px;line-height:1.45;color:#cbd5e1}.mini{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini div{background:#0b1220;border:1px solid rgba(38,53,79,.8);border-radius:12px;padding:9px;min-width:0}.label{display:block;color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:5px}.value{display:block;font-size:12px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.footer{border-top:1px solid rgba(38,53,79,.8);padding-top:10px;display:flex;justify-content:space-between;gap:10px;color:#718096;font-size:11px}.empty{text-align:center;padding:50px 20px;color:var(--muted);border:1px dashed var(--line);border-radius:18px;background:rgba(17,24,39,.45);grid-column:1/-1}dialog{border:1px solid var(--line);border-radius:20px;background:#0f172a;color:var(--text);max-width:min(980px,94vw);width:980px;padding:0}dialog::backdrop{background:rgba(0,0,0,.65)}.modal-head{padding:18px 20px;background:#111827;border-bottom:1px solid var(--line);border-radius:20px 20px 0 0;display:flex;justify-content:space-between;gap:12px}.modal-body{padding:18px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;max-height:72vh;overflow:auto}.field{background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:10px}.field.full{grid-column:1/-1}.field-title{color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:6px}.field-value{font-size:13px;color:#e2e8f0;line-height:1.45;word-break:break-word}.field-value a{color:var(--green);text-decoration:none}.field-value a:hover{text-decoration:underline}.modal-media{display:block;width:100%;max-height:420px;object-fit:contain;background:#0b1220}.to-top{position:fixed;right:18px;bottom:18px;z-index:50;width:44px;height:44px;border-radius:50%;padding:0;font-size:22px;line-height:1;background:#0f172a;border:1px solid var(--green);color:var(--green);box-shadow:0 10px 25px rgba(0,0,0,.35);opacity:0;pointer-events:none;transform:translateY(12px);transition:.18s ease}.to-top.show{opacity:1;pointer-events:auto;transform:translateY(0)}@media(max-width:760px){.wrap{padding:7px 8px}button,input,select{font-size:12px;padding:5px 7px}input,select{width:100%}.modal-body{grid-template-columns:1fr}.card-image,.thumb-placeholder{height:165px}main{padding:12px 8px 60px}}
</style>
</head>
<body>
<header><div class="wrap"><h1>Driftwood Garden</h1><div class="tabs"><button id="seedsBtn" class="tab active">Seeds</button><button id="plantsBtn" class="tab">Plants</button><button id="wishlistBtn" class="tab">Wishlist</button></div><div id="legend" class="legend"></div><div class="controls"><input id="search" type="search" placeholder="Search..."><select id="priority"></select><select id="filterFamily"><option value="all">All families</option></select><select id="filterA"><option value="all">All locations</option></select><select id="filterB"><option value="all">All statuses</option></select></div></div></header>
<main><div id="grid" class="grid"><div class="empty">Loading catalogue...</div></div></main>
<button id="toTop" class="to-top" aria-label="Back to top" title="Back to top">↑</button>
<dialog id="dlg"><div class="modal-head"><div><div id="badges"></div><div id="title" class="name"></div><div id="common" class="common"></div></div><button id="closeBtn">Close</button></div><div id="modal" class="modal-body"></div></dialog>
<script>
const $=id=>document.getElementById(id);
const maps={
 wishlist:{id:'Wishlist ID',rating:'Priority',status:'Status',name:'Scientific name',family:'Family',common:'Common name EN',commonDe:'Common name DE',commonPt:'Common name PT',origin:'Native origin',location:'Future location',difficulty:'Difficulty',notes:'Notes',confidence:'Confidence',light:'Light needs',water:'Water needs',soil:'Soil / substrate',substrate:'Recommended substrate mix (%)',buy:'Where to buy EU/UK',wiki:'Wikipedia',powo:'Kew POWO / source search',rarity:'Rarity in cultivation',conservation:'Conservation / endangerment level',pollinators:'Pollinators / ecology'},
 plants:{id:'Plant ID',rating:'Difficulty rating',status:'Status',name:'Scientific name',family:'Family',common:'Common name EN',commonDe:'Common name DE',commonPt:'Common name PT',origin:'Original geographical provenance',provenance:'Origin / provenance',source:'Source / acquired',location:'Current location',futureLocation:'Future location',form:'Plant form',pot:'Pot size',light:'Light',water:'Water',soil:'Soil / substrate',wiki:'Wikipedia',notes:'Notes',confidence:'Confidence'},
 seeds:{id:'Seed Lot ID',rating:'Germination priority',status:'Status',name:'Scientific name',family:'Family',common:'Common name EN',commonDe:'Common name DE',commonPt:'Common name PT',origin:'Seed lot origin',difficulty:'Viability status',notes:'Species notes',confidence:'Confidence',count:'Estimated seed count',sowby:'Estimated sow-by date',pretreat:'Pretreatment needed',germination:'Germination instructions',source:'Source type',wikiTitle:'Wikipedia title',wiki:'Wikipedia'}
};
const files={wishlist:'plants.csv',plants:'owned-plants.csv',seeds:'seeds.csv',seedExtras:'seeds-extra.csv'};
const legends={wishlist:'Star rating: desirability',plants:'Star rating: care difficulty',seeds:'Star rating: viability urgency'};
const ratingLabels={wishlist:'All star ratings',plants:'All star ratings',seeds:'All star ratings'};
let mode='seeds',data={wishlist:[],plants:[],seeds:[]},imageRows=[],byKey=new Map(),imageCache=new Map();
function clean(v){return(v??'').toString().trim()}
function esc(v){return clean(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function stars(v){return clean(v).split('★').length-1}
function alpha(a,b){return clean(a.name).localeCompare(clean(b.name),undefined,{sensitivity:'base'})}
function parseCSV(text){const rows=[];let row=[],cell='',quote=false;for(let i=0;i<text.length;i++){const ch=text[i],next=text[i+1];if(ch==='"'&&quote&&next==='"'){cell+='"';i++}else if(ch==='"'){quote=!quote}else if(ch===','&&!quote){row.push(cell);cell=''}else if((ch==='\n'||ch==='\r')&&!quote){if(ch==='\r'&&next==='\n')i++;row.push(cell);rows.push(row);row=[];cell=''}else cell+=ch}row.push(cell);rows.push(row);return rows.filter(r=>r.some(c=>clean(c)))}
function toObjects(text){const m=parseCSV(text),h=(m[0]||[]).map(x=>clean(x).replace(/^\uFEFF/,''));return m.slice(1).map(r=>{const o={};h.forEach((k,i)=>o[k]=r[i]??'');return o})}
function transform(rows,map,type){return rows.map(r=>{const o={type};Object.entries(map).forEach(([k,col])=>o[k]=clean(r[col]));o.stars=stars(o.rating);o.key=type+':'+o.id;return o}).filter(x=>x.id&&x.name).sort(alpha)}
async function loadCSV(url){const res=await fetch(url+'?v='+Date.now());if(!res.ok)throw Error(url+' '+res.status);return res.text()}
function current(){return data[mode]||[]}
function countValues(key){return current().reduce((m,x)=>{const v=clean(x[key]);if(v)m[v]=(m[v]||0)+1;return m},{})}
function unique(key){return Object.keys(countValues(key)).sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}))}
function optionText(label,count){return label+' ('+count+')'}
function commonHtml(x){const p=[];if(x.common)p.push('EN: '+esc(x.common));if(x.commonDe)p.push('DE: '+esc(x.commonDe));if(x.commonPt)p.push('PT: '+esc(x.commonPt));return p.join(' · ')||'—'}
function titleForWiki(x){const fromLink=clean(x.wiki).split('/wiki/')[1];const raw=clean(x.wikiTitle)||(fromLink?fromLink.replace(/_/g,' '):'')||x.name;try{return decodeURIComponent(raw)}catch(e){return raw}}
function imageFor(x){return imageCache.get(x.key)||imageCache.get(x.name)||imageCache.get(titleForWiki(x))||null}
function imageBlock(x){const img=imageFor(x);return img&&img.src?'<div class="card-image"><img loading="lazy" src="'+esc(img.src)+'" alt="'+esc(x.name)+'"></div>':'<div class="thumb-placeholder">No image yet</div>'}
function fillFilters(){const rows=current(),fam=$('filterFamily'),fA=$('filterA'),fB=$('filterB'),pr=$('priority'),familyCounts=countValues('family'),locationCounts=countValues('location'),statusCounts=countValues('status');$('legend').textContent=legends[mode];pr.innerHTML='';pr.add(new Option(optionText(ratingLabels[mode],rows.length),'all'));[[5,'★★★★★ only'],[4,'★★★★ and up'],[3,'★★★ and up'],[2,'★★ and up']].forEach(([n,label])=>pr.add(new Option(optionText(label,rows.filter(x=>x.stars>=n).length),String(n))));fam.innerHTML='';fam.add(new Option(optionText('All families',rows.length),'all'));unique('family').forEach(v=>fam.add(new Option(optionText(v,familyCounts[v]),v)));fA.innerHTML='';fA.add(new Option(optionText('All locations',rows.length),'all'));fB.innerHTML='';fB.add(new Option(optionText('All statuses',rows.length),'all'));unique('status').forEach(v=>fB.add(new Option(optionText(v,statusCounts[v]),v)));if(mode==='seeds'){fA.style.display='none';fA.value='all'}else{fA.style.display='';unique('location').forEach(v=>fA.add(new Option(optionText(v,locationCounts[v]),v)))}}
function matches(x){const q=$('search').value.toLowerCase();return(!q||Object.values(x).join(' ').toLowerCase().includes(q))&&($('priority').value==='all'||x.stars>=Number($('priority').value))&&($('filterFamily').value==='all'||x.family===$('filterFamily').value)&&($('filterA').value==='all'||mode==='seeds'||x.location===$('filterA').value)&&($('filterB').value==='all'||x.status===$('filterB').value)}
function emptyMessage(){if(mode==='plants')return 'No plants catalogued yet. Add records to owned-plants.csv.';if(mode==='wishlist')return 'No matching wishlist records.';return 'No matching seed records.'}
function render(){const list=current().filter(matches).sort(alpha);if(!list.length){$('grid').innerHTML='<div class="empty">'+emptyMessage()+'</div>';return}$('grid').innerHTML=list.map(card).join('')}
function card(x){const seed=mode==='seeds',leftLabel=seed?'Count':'Location',leftVal=seed?x.count:x.location,rightLabel=seed?'Sow by':'Rating',rightVal=seed?x.sowby:x.rating,noteVal=seed?(x.difficulty||x.notes):x.notes,noteHtml=noteVal?'<div class="notes"><span class="label">'+(seed?'Viability / notes':'Notes')+'</span>'+esc(noteVal)+'</div>':'';return '<article class="card" data-key="'+esc(x.key)+'">'+imageBlock(x)+'<div class="body"><div class="top"><span class="badge family">'+esc(x.family||'—')+'</span><span class="badge priority">'+esc(x.rating||'—')+'</span></div><div><div class="name">'+esc(x.name)+'</div><div class="common">'+commonHtml(x)+'</div></div>'+noteHtml+'<div class="mini"><div><span class="label">'+leftLabel+'</span><span class="value">'+esc(leftVal||'—')+'</span></div><div><span class="label">'+rightLabel+'</span><span class="value">'+esc(rightVal||'—')+'</span></div></div><div class="footer"><span>Origin: '+esc(x.origin||'—')+'</span><span>'+esc(x.id)+'</span></div></div></article>'}
function fieldHtml(v){v=clean(v);if(!v)return '—';if(/^https?:\/\//i.test(v))return '<a href="'+esc(v)+'" target="_blank" rel="noopener noreferrer">'+esc(v)+'</a>';return esc(v)}
function openItem(key){const x=byKey.get(key);if(!x)return;$('badges').innerHTML='<span class="badge family">'+esc(x.family)+'</span> <span class="badge priority">'+esc(x.rating)+'</span> <span class="badge">'+esc(x.status)+'</span>';$('title').textContent=x.name;$('common').innerHTML=commonHtml(x)+' · '+esc(x.id);const img=imageFor(x),media=img&&img.src?'<div class="field full"><div class="field-title">Image</div><img class="modal-media" src="'+esc(img.src)+'" alt="'+esc(x.name)+'"></div>':'';const fields=Object.entries(maps[mode]).filter(([k])=>k!=='wikiTitle'&&clean(x[k])).map(([k,label])=>'<div class="field '+(['notes','germination','buy','soil','substrate','difficulty','wiki','powo','conservation','pollinators','provenance'].includes(k)?'full':'')+'"><div class="field-title">'+esc(label)+'</div><div class="field-value">'+fieldHtml(x[k])+'</div></div>').join('');$('modal').innerHTML=media+fields;$('dlg').showModal()}
function setMode(next){mode=next;['wishlist','plants','seeds'].forEach(m=>$(m+'Btn').classList.toggle('active',mode===m));$('search').value='';fillFilters();$('priority').value='all';$('filterFamily').value='all';$('filterA').value='all';$('filterB').value='all';render()}
function loadManualImages(){imageRows.forEach(r=>{const url=clean(r['Image URL']);if(!url)return;const wl=clean(r['Wishlist ID']),pl=clean(r['Plant ID']),name=clean(r['Scientific name']);if(wl)imageCache.set('wishlist:'+wl,{src:url});if(pl)imageCache.set('plants:'+pl,{src:url});if(name)imageCache.set(name,{src:url})})}
async function loadWikiImages(records){const titles=[...new Set(records.map(titleForWiki).filter(Boolean))].filter(t=>!imageCache.has(t));for(let i=0;i<titles.length;i+=12){const batch=titles.slice(i,i+12);batch.forEach(t=>imageCache.set(t,{pending:true}));try{const url='https://en.wikipedia.org/w/api.php?origin=*&format=json&action=query&redirects=1&prop=pageimages|info&inprop=url&piprop=thumbnail&pithumbsize=900&titles='+encodeURIComponent(batch.join('|'));const res=await fetch(url),json=await res.json(),pages=Object.values((json.query&&json.query.pages)||{});pages.forEach(p=>{if(p&&p.title)imageCache.set(p.title,{src:p.thumbnail&&p.thumbnail.source||'',page:p.fullurl||''})});batch.forEach(t=>{if(imageCache.get(t)?.pending)imageCache.set(t,{src:''})})}catch(e){batch.forEach(t=>imageCache.set(t,{src:''}))}render()}}
$('wishlistBtn').onclick=()=>setMode('wishlist');$('plantsBtn').onclick=()=>setMode('plants');$('seedsBtn').onclick=()=>setMode('seeds');$('closeBtn').onclick=()=>$('dlg').close();['search','priority','filterFamily','filterA','filterB'].forEach(id=>{$(id).addEventListener('input',render);$(id).addEventListener('change',render)});$('grid').addEventListener('click',e=>{const c=e.target.closest('.card');if(c)openItem(c.dataset.key)});window.addEventListener('scroll',()=>$('toTop').classList.toggle('show',scrollY>500));$('toTop').onclick=()=>scrollTo({top:0,behavior:'smooth'});
(async function init(){try{const [wl,pl,seeds,seedExtras,img]=await Promise.all([loadCSV(files.wishlist),loadCSV(files.plants),loadCSV(files.seeds),loadCSV(files.seedExtras).catch(()=>''),loadCSV('images.csv').catch(()=>'')]);const seedRows=[...toObjects(seeds),...(seedExtras?toObjects(seedExtras):[])];data.wishlist=transform(toObjects(wl),maps.wishlist,'wishlist');data.plants=transform(toObjects(pl),maps.plants,'plants');data.seeds=transform(seedRows,maps.seeds,'seeds');imageRows=img?toObjects(img):[];byKey=new Map([...data.wishlist,...data.plants,...data.seeds].map(x=>[x.key,x]));loadManualImages();fillFilters();render();loadWikiImages([...data.wishlist,...data.plants,...data.seeds])}catch(err){console.error(err);$('grid').innerHTML='<div class="empty">Could not load catalogue files.</div>'}})();
</script>
</body>
</html>
