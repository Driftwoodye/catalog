<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Silveira Botanics</title>
<style>
:root{--bg:#0b1220;--panel:#111827;--line:#26354f;--text:#e5e7eb;--muted:#94a3b8;--green:#34d399;--amber:#fbbf24}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#15382e 0,#0b1220 35%,#07101d 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{background:rgba(7,16,29,.94);border-bottom:1px solid var(--line)}.wrap{max-width:1280px;margin:0 auto;padding:12px 18px}h1{margin:0;color:var(--green);font-size:clamp(22px,4vw,32px)}.controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}input,select,button{background:#0f172a;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14px}input{min-width:min(340px,100%)}input:focus,select:focus{outline:none;border-color:var(--green)}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-top:12px}.stat{background:rgba(17,24,39,.72);border:1px solid var(--line);border-radius:14px;padding:10px}.stat .num{font-size:22px;font-weight:800}.stat .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}main{max-width:1280px;margin:0 auto;padding:18px 18px 60px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}.card{background:linear-gradient(180deg,rgba(17,24,39,.97),rgba(15,23,42,.97));border:1px solid var(--line);border-radius:18px;overflow:hidden;min-height:330px;display:flex;flex-direction:column;cursor:pointer}.card:hover{border-color:#3f567a}.card-img{height:185px;background:#0b1220;border-bottom:1px solid var(--line)}.card-img img{width:100%;height:100%;object-fit:cover;display:block}.card-body{padding:15px;display:flex;flex-direction:column;gap:11px;flex:1}.topline{display:flex;justify-content:space-between;gap:10px}.badge{font-size:11px;border:1px solid var(--line);background:#0b1220;border-radius:999px;padding:5px 8px;white-space:nowrap}.family{color:var(--green);border-color:#14532d;background:rgba(6,78,59,.35)}.priority{color:var(--amber);border-color:#78350f;background:rgba(120,53,15,.25)}.name{font-size:19px;font-weight:800;font-style:italic;line-height:1.15}.common{color:var(--muted);font-size:13px;margin-top:3px}.names{color:#708098;font-size:11px;margin-top:3px}.notes{background:#0b1220;border:1px solid rgba(38,53,79,.8);border-radius:12px;padding:10px;font-size:12px;line-height:1.45;color:#cbd5e1;min-height:68px}.mini{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini div{background:#0b1220;border:1px solid rgba(38,53,79,.8);border-radius:12px;padding:9px;min-width:0}.label{display:block;color:#64748b;font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:4px}.value{display:block;font-size:12px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}.chip{font-size:10px;color:#aebbd0;background:#0b1220;border:1px solid rgba(38,53,79,.8);border-radius:999px;padding:5px 7px}.footer{border-top:1px solid rgba(38,53,79,.8);padding-top:10px;display:flex;justify-content:space-between;gap:10px;color:#718096;font-size:11px}.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted);border:1px dashed var(--line);border-radius:18px;background:rgba(17,24,39,.45)}dialog{border:1px solid var(--line);border-radius:20px;background:#0f172a;color:var(--text);max-width:min(940px,94vw);width:940px;padding:0}dialog::backdrop{background:rgba(0,0,0,.65)}.modal-head{padding:18px 20px;background:#111827;border-bottom:1px solid var(--line);border-radius:20px 20px 0 0;display:flex;justify-content:space-between;gap:12px}.modal-body{padding:18px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;max-height:72vh;overflow:auto}.field{background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:10px}.field.full,.photos{grid-column:1/-1}.field-title{color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:6px}.field-value{font-size:13px;color:#e2e8f0;line-height:1.45;word-break:break-word}.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.photo-card{background:#0b1220;border:1px solid var(--line);border-radius:12px;overflow:hidden}.photo-card img{width:100%;height:190px;object-fit:cover;display:block}.photo-caption{padding:7px 8px;font-size:10px;color:#94a3b8;line-height:1.35}a{color:var(--green)}@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}.modal-body{grid-template-columns:1fr}.photo-grid{grid-template-columns:1fr}input,select{width:100%}}
</style>
</head>
<body>
<header><div class="wrap"><h1>Silveira Botanics</h1><div class="controls"><input id="searchInput" type="search" placeholder="Search name, family, origin, notes..." /><select id="priorityFilter"><option value="all">All priorities</option><option value="5">★★★★★ only</option><option value="4">★★★★ and up</option><option value="3">★★★ and up</option></select><select id="locationFilter"><option value="all">All locations</option></select><select id="difficultyFilter"><option value="all">All difficulties</option></select><select id="statusFilter"><option value="all">All statuses</option></select></div><div class="stats"><div class="stat"><div class="num" id="countAll">—</div><div class="label">Total taxa</div></div><div class="stat"><div class="num" id="countShown">—</div><div class="label">Shown now</div></div><div class="stat"><div class="num" id="countFive">—</div><div class="label">★★★★★</div></div><div class="stat"><div class="num" id="countGreenhouse">—</div><div class="label">Greenhouse</div></div></div><p id="loadStatus" style="display:none"></p></div></header>
<main><div id="plantsGrid" class="grid"><div class="empty">Loading plants…</div></div></main>
<dialog id="plantDialog"><div class="modal-head"><div><div id="modalBadges"></div><div id="modalTitle" class="name"></div><div id="modalCommon" class="common"></div></div><button onclick="document.getElementById('plantDialog').close()">Close</button></div><div id="modalBody" class="modal-body"></div></dialog>
<script>
const CSV_URL="plants.csv";
const IMAGES_URL="images.csv";
let plants=[];let byId=new Map();let imagesByPlant=new Map();
const columnMap={id:"Wishlist ID",source:"Source",priority:"Priority",status:"Status",name:"Scientific name",family:"Family",common_en:"Common name EN",common_de:"Common name DE",common_pt:"Common name PT",origin:"Native origin",habitat:"Natural habitat",temp:"Temperature / hardiness target",light:"Light needs",humidity:"Humidity",water:"Water needs",soil:"Soil / substrate",substrate_mix:"Recommended substrate mix (%)",hardiness:"Winter hardiness in Heiligenhaus",difficulty:"Difficulty",location:"Future location",rarity:"Rarity in cultivation",bonsai:"Bonsai potential",invasive:"Invasive potential",conservation:"Conservation / endangerment level",pollinators:"Pollinators / ecology",uses:"Edible / medicinal / ethnobotanical",propagation:"Seed source / propagation",buy:"Where to buy EU/UK",wiki:"Wikipedia",powo:"Kew POWO / source search",notes:"Notes",confidence:"Confidence"};
const detailFields=[["id","Wishlist ID"],["source","Source"],["status","Status"],["priority","Priority"],["family","Family"],["origin","Native origin"],["habitat","Natural habitat"],["temp","Temperature / hardiness target"],["light","Light needs"],["humidity","Humidity"],["water","Water needs"],["soil","Soil / substrate"],["substrate_mix","Recommended substrate mix (%)"],["hardiness","Winter hardiness in Heiligenhaus"],["difficulty","Difficulty"],["location","Future location"],["rarity","Rarity in cultivation"],["bonsai","Bonsai potential"],["invasive","Invasive potential"],["conservation","Conservation / endangerment level"],["pollinators","Pollinators / ecology"],["uses","Edible / medicinal / ethnobotanical"],["propagation","Seed source / propagation"],["buy","Where to buy EU/UK"],["wiki","Wikipedia"],["powo","Kew POWO / source search"],["notes","Notes"],["confidence","Confidence"]];
function clean(v){return(v??"").toString().trim()}function escapeHTML(v){return clean(v).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}function stripHTML(v){const d=document.createElement("div");d.innerHTML=clean(v);return d.textContent||d.innerText||""}function countStars(p){return clean(p).split("★").length-1}
function parseCSV(text){const rows=[];let row=[],cell="",q=false;for(let i=0;i<text.length;i++){const ch=text[i],next=text[i+1];if(ch==='"'&&q&&next==='"'){cell+='"';i++}else if(ch==='"'){q=!q}else if(ch===','&&!q){row.push(cell);cell=""}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&next==='\n')i++;row.push(cell);rows.push(row);row=[];cell=""}else{cell+=ch}}row.push(cell);rows.push(row);return rows.filter(r=>r.some(c=>clean(c)))}
function csvToObjects(text){const m=parseCSV(text),h=(m[0]||[]).map(x=>clean(x).replace(/^\uFEFF/,""));return m.slice(1).map(r=>{const o={};h.forEach((x,i)=>o[x]=r[i]??"");return o})}
function transformRows(rows){return rows.map(row=>{const p={};Object.entries(columnMap).forEach(([key,col])=>p[key]=clean(row[col]));p.stars=countStars(p.priority);return p}).filter(p=>p.name&&p.id!=="Wishlist ID")}
async function loadImages(){try{const res=await fetch(IMAGES_URL);if(!res.ok)return;const imageRows=csvToObjects(await res.text()).map(r=>({id:clean(r["Wishlist ID"]),name:clean(r["Scientific name"]),type:clean(r["Image type"]).toLowerCase(),url:clean(r["Image URL"]),author:clean(r["Author"]),license:clean(r["License"]),source:clean(r["Source URL"]),notes:clean(r["Notes"])})).filter(r=>r.id&&r.type&&r.url);imagesByPlant=new Map();for(const img of imageRows){if(!imagesByPlant.has(img.id))imagesByPlant.set(img.id,[]);imagesByPlant.get(img.id).push(img)}}catch(e){console.warn("No images.csv loaded",e)}}
function getImages(id,type){return(imagesByPlant.get(id)||[]).filter(img=>img.type===type)}
function getMainImage(p){return getImages(p.id,"whole")[0]||getImages(p.id,"general")[0]||getImages(p.id,"flower")[0]||getImages(p.id,"leaf")[0]||getImages(p.id,"fruit")[0]||getImages(p.id,"auto")[0]||null}
function wikipediaTitleFromUrl(url){const m=clean(url).match(/\/wiki\/([^#?]+)/);return m?decodeURIComponent(m[1]).replace(/_/g," "):""}
function addImageRow(img){if(!imagesByPlant.has(img.id))imagesByPlant.set(img.id,[]);imagesByPlant.get(img.id).push(img)}
function imageSearchName(p){return clean(p.name).replace(/'[^']+'/g,"").replace(/\bsp\.\b/gi,"").trim()}
function commonsFileUrl(filename,width=700){return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(filename)}?width=${width}`}
function commonsFilePage(filename){return `https://commons.wikimedia.org/wiki/File:${encodeURIComponent(filename.replace(/ /g,"_"))}`}
async function loadWikidataFallbackImages(){const missing=plants.filter(p=>!getMainImage(p));if(!missing.length)return;for(let i=0;i<missing.length;i+=8){const batch=missing.slice(i,i+8);await Promise.all(batch.map(async p=>{const q=imageSearchName(p);if(!q)return;try{const search=`https://www.wikidata.org/w/api.php?action=wbsearchentities&origin=*&format=json&language=en&type=item&limit=1&search=${encodeURIComponent(q)}`;const sr=await fetch(search);if(!sr.ok)return;const sd=await sr.json();const id=sd.search?.[0]?.id;if(!id)return;const ent=`https://www.wikidata.org/w/api.php?action=wbgetentities&origin=*&format=json&ids=${encodeURIComponent(id)}&props=claims`;const er=await fetch(ent);if(!er.ok)return;const ed=await er.json();const filename=ed.entities?.[id]?.claims?.P18?.[0]?.mainsnak?.datavalue?.value;if(!filename)return;addImageRow({id:p.id,name:p.name,type:"auto",url:commonsFileUrl(filename),author:"Wikidata / Wikimedia Commons",license:"See source page",source:commonsFilePage(filename),notes:"Automatic representative image from Wikidata P18"})}catch(e){console.warn("Wikidata fallback failed for",p.name,e)}}));renderPlants()}}
async function loadWikipediaPageFallbackImages(){const candidates=plants.filter(p=>!getMainImage(p)&&p.wiki&&p.wiki.includes("wikipedia.org/wiki/"));if(!candidates.length)return;const titleToPlant=new Map();for(const p of candidates){const title=wikipediaTitleFromUrl(p.wiki);if(title&&!titleToPlant.has(title))titleToPlant.set(title,p)}const titles=[...titleToPlant.keys()];for(let i=0;i<titles.length;i+=40){const batch=titles.slice(i,i+40);const api=`https://en.wikipedia.org/w/api.php?action=query&origin=*&format=json&prop=pageimages&piprop=thumbnail&pithumbsize=700&titles=${encodeURIComponent(batch.join("|"))}`;try{const res=await fetch(api);if(!res.ok)continue;const data=await res.json();for(const page of Object.values(data.query?.pages||{})){if(!page.thumbnail?.source)continue;const plant=titleToPlant.get(page.title);if(!plant)continue;addImageRow({id:plant.id,name:plant.name,type:"auto",url:page.thumbnail.source,author:"English Wikipedia / Wikimedia Commons",license:"See source page",source:plant.wiki,notes:"Automatic representative image from English Wikipedia page"})}}catch(e){console.warn("English Wikipedia fallback failed",e)}}renderPlants()}
async function loadWikipediaLanguageFallbackImages(){const langs=["de","fr","es","pt","it","nl"];for(const lang of langs){const missing=plants.filter(p=>!getMainImage(p));if(!missing.length)return;for(let i=0;i<missing.length;i+=8){const batch=missing.slice(i,i+8);await Promise.all(batch.map(async p=>{const q=imageSearchName(p);if(!q)return;const api=`https://${lang}.wikipedia.org/w/api.php?action=query&origin=*&format=json&generator=search&gsrsearch=${encodeURIComponent(q)}&gsrlimit=1&prop=pageimages|info&piprop=thumbnail&pithumbsize=700&inprop=url`;try{const res=await fetch(api);if(!res.ok)return;const data=await res.json();const page=Object.values(data.query?.pages||{})[0];if(!page?.thumbnail?.source)return;addImageRow({id:p.id,name:p.name,type:"auto",url:page.thumbnail.source,author:`${lang}.wikipedia / Wikimedia Commons`,license:"See source page",source:page.fullurl||`https://${lang}.wikipedia.org/`,notes:`Automatic representative image from ${lang}.wikipedia.org`})}catch(e){console.warn(`${lang} Wikipedia fallback failed for`,p.name,e)}}));renderPlants()}}}
async function loadINaturalistFallbackImages(){const missing=plants.filter(p=>!getMainImage(p));if(!missing.length)return;for(let i=0;i<missing.length;i+=8){const batch=missing.slice(i,i+8);await Promise.all(batch.map(async p=>{const q=imageSearchName(p);if(!q)return;const api=`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(q)}&per_page=1&locale=en`;try{const res=await fetch(api);if(!res.ok)return;const data=await res.json();const taxon=data.results?.[0];const photo=taxon?.default_photo;if(!photo?.medium_url&&!photo?.url)return;addImageRow({id:p.id,name:p.name,type:"auto",url:photo.medium_url||photo.url,author:photo.attribution||"iNaturalist contributor",license:photo.license_code||"See source page",source:`https://www.inaturalist.org/taxa/${taxon.id}`,notes:"Automatic representative image from iNaturalist taxon page"})}catch(e){console.warn("iNaturalist fallback failed for",p.name,e)}}));renderPlants()}}
async function loadGBIFFallbackImages(){const missing=plants.filter(p=>!getMainImage(p));if(!missing.length)return;for(let i=0;i<missing.length;i+=6){const batch=missing.slice(i,i+6);await Promise.all(batch.map(async p=>{const q=imageSearchName(p);if(!q)return;try{const match=await fetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(q)}`);if(!match.ok)return;const md=await match.json();const key=md.usageKey;if(!key)return;const occ=await fetch(`https://api.gbif.org/v1/occurrence/search?taxonKey=${encodeURIComponent(key)}&mediaType=StillImage&limit=5`);if(!occ.ok)return;const od=await occ.json();const rec=(od.results||[]).find(r=>r.media&&r.media[0]&&r.media[0].identifier);if(!rec)return;const media=rec.media[0];addImageRow({id:p.id,name:p.name,type:"auto",url:media.identifier,author:media.creator||rec.recordedBy||"GBIF occurrence media",license:media.license||"See source page",source:`https://www.gbif.org/occurrence/${rec.key}`,notes:"Automatic representative image from GBIF occurrence media"})}catch(e){console.warn("GBIF fallback failed for",p.name,e)}}));renderPlants()}}
async function loadCommonsFallbackImages(){const missing=plants.filter(p=>!getMainImage(p));if(!missing.length)return;for(let i=0;i<missing.length;i+=8){const batch=missing.slice(i,i+8);await Promise.all(batch.map(async p=>{let query=imageSearchName(p);if(!query)return;const api=`https://commons.wikimedia.org/w/api.php?action=query&origin=*&format=json&generator=search&gsrnamespace=6&gsrsearch=${encodeURIComponent(query+" plant")}&gsrlimit=3&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=700`;try{const res=await fetch(api);if(!res.ok)return;const data=await res.json();const pages=Object.values(data.query?.pages||{});const page=pages.find(pg=>pg.imageinfo&&pg.imageinfo[0]&&(pg.imageinfo[0].thumburl||pg.imageinfo[0].url));if(!page)return;const info=page.imageinfo[0];const meta=info.extmetadata||{};const source=`https://commons.wikimedia.org/wiki/${encodeURIComponent(page.title.replace(/ /g,"_"))}`;addImageRow({id:p.id,name:p.name,type:"auto",url:info.thumburl||info.url,author:stripHTML(meta.Artist?.value||meta.Credit?.value||"Wikimedia Commons"),license:stripHTML(meta.LicenseShortName?.value||meta.UsageTerms?.value||"See source page"),source,notes:"Automatic representative image from Wikimedia Commons search"})}catch(e){console.warn("Commons fallback failed for",p.name,e)}}));renderPlants()}}
async function loadAllFallbackImages(){await loadWikidataFallbackImages();await loadWikipediaPageFallbackImages();await loadWikipediaLanguageFallbackImages();await loadINaturalistFallbackImages();await loadGBIFFallbackImages();await loadCommonsFallbackImages();renderPlants()}
async function loadPlants(){try{await loadImages();const res=await fetch(CSV_URL);if(!res.ok)throw new Error("Could not fetch plants.csv: "+res.status);plants=transformRows(csvToObjects(await res.text()));byId=new Map(plants.map(p=>[p.id,p]));if(!plants.length)throw new Error("plants.csv loaded, but no plant records were found");setupFilters();updateStats();renderPlants();loadAllFallbackImages()}catch(e){console.error(e);document.getElementById("loadStatus").textContent="Could not load plants.csv. Make sure index.html and plants.csv are in the same folder.";document.getElementById("plantsGrid").innerHTML='<div class="empty">Could not load plants.csv.</div>'}}
function uniqueValues(key){return[...new Set(plants.map(p=>p[key]).filter(Boolean))].sort((a,b)=>a.localeCompare(b))}function fillSelect(id,key){const s=document.getElementById(id);uniqueValues(key).forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;s.appendChild(o)})}function setupFilters(){fillSelect("locationFilter","location");fillSelect("difficultyFilter","difficulty");fillSelect("statusFilter","status")}
function updateStats(){document.getElementById("countAll").textContent=plants.length;document.getElementById("countFive").textContent=plants.filter(p=>p.stars===5).length;document.getElementById("countGreenhouse").textContent=plants.filter(p=>p.location.toLowerCase().includes("greenhouse")).length}
function matches(p){const q=document.getElementById("searchInput").value.toLowerCase(),priority=document.getElementById("priorityFilter").value,loc=document.getElementById("locationFilter").value,diff=document.getElementById("difficultyFilter").value,status=document.getElementById("statusFilter").value;const hay=[p.name,p.family,p.common_en,p.common_de,p.common_pt,p.origin,p.habitat,p.location,p.rarity,p.conservation,p.substrate_mix,p.notes,p.buy,p.uses,p.pollinators].join(" ").toLowerCase();return(!q||hay.includes(q))&&(priority==="all"||p.stars>=Number(priority))&&(loc==="all"||p.location===loc)&&(diff==="all"||p.difficulty===diff)&&(status==="all"||p.status===status)}
function renderPlants(){const filtered=plants.filter(matches);document.getElementById("countShown").textContent=filtered.length;if(!filtered.length){document.getElementById("plantsGrid").innerHTML='<div class="empty">No matching plants found.</div>';return}document.getElementById("plantsGrid").innerHTML=filtered.map(p=>{const main=getMainImage(p);return `<article class="card" onclick="openPlant('${escapeHTML(p.id)}')">${main?`<div class="card-img"><img src="${escapeHTML(main.url)}" alt="${escapeHTML(p.name)}" loading="lazy"></div>`:""}<div class="card-body"><div class="topline"><span class="badge family">${escapeHTML(p.family||"—")}</span><span class="badge priority">${escapeHTML(p.priority||"—")}</span></div><div><div class="name">${escapeHTML(p.name)}</div><div class="common"><strong>EN:</strong> ${escapeHTML(p.common_en||"—")}</div><div class="names">🇩🇪 ${escapeHTML(p.common_de||"—")} · 🇵🇹 ${escapeHTML(p.common_pt||"—")}</div></div><div class="notes"><span class="label">Notes</span>${escapeHTML(p.notes||"No notes recorded.")}</div><div class="mini"><div><span class="label">Destination</span><span class="value">${escapeHTML(p.location||"—")}</span></div><div><span class="label">Difficulty</span><span class="value">${escapeHTML(p.difficulty||"—")}</span></div></div><div class="chips"><span class="chip">☀️ ${escapeHTML(p.light||"—")}</span><span class="chip">💧 ${escapeHTML(p.water||"—")}</span><span class="chip">☁️ ${escapeHTML(p.humidity||"—")}</span></div><div class="footer"><span>📍 ${escapeHTML(p.origin||"—")}</span><span>${escapeHTML(p.confidence||"")}</span></div></div></article>`}).join("")}
function imageCredit(img){const parts=[];if(img.author)parts.push(escapeHTML(img.author));if(img.license)parts.push(escapeHTML(img.license));let out=parts.join(" · ");if(img.source)out+=`${out?" · ":""}<a href="${escapeHTML(img.source)}" target="_blank">source</a>`;return out}function imageCard(img,label){return `<div class="photo-card"><img src="${escapeHTML(img.url)}" alt="${escapeHTML(label)}" loading="lazy"><div class="photo-caption">${escapeHTML(label)}${imageCredit(img)?" · "+imageCredit(img):""}</div></div>`}
function openPlant(id){const p=byId.get(id);if(!p)return;document.getElementById("modalBadges").innerHTML=`<span class="badge family">${escapeHTML(p.family)}</span> <span class="badge priority">${escapeHTML(p.priority)}</span> <span class="badge">${escapeHTML(p.status)}</span>`;document.getElementById("modalTitle").textContent=p.name;document.getElementById("modalCommon").textContent=`EN: ${p.common_en||"—"} · DE: ${p.common_de||"—"} · PT: ${p.common_pt||"—"}`;const photoItems=[...getImages(p.id,"whole").map(img=>imageCard(img,"Whole plant")),...getImages(p.id,"general").map(img=>imageCard(img,"General plant")),...getImages(p.id,"flower").map(img=>imageCard(img,"Flower")),...getImages(p.id,"leaf").map(img=>imageCard(img,"Leaf")),...getImages(p.id,"fruit").map(img=>imageCard(img,"Fruit")),...getImages(p.id,"auto").map(img=>imageCard(img,"Representative image"))];const photos=photoItems.length?`<div class="photos"><div class="field-title">Identification photos</div><div class="photo-grid">${photoItems.join("")}</div></div>`:"";const fields=detailFields.map(([key,label])=>{let value=p[key]||"—";if((key==="wiki"||key==="powo")&&value.startsWith("http")){value=`<a href="${escapeHTML(value)}" target="_blank">${escapeHTML(value)}</a>`}else{value=escapeHTML(value)}const full=["habitat","temp","soil","substrate_mix","hardiness","pollinators","uses","propagation","buy","notes"].includes(key)?" full":"";return `<div class="field${full}"><div class="field-title">${escapeHTML(label)}</div><div class="field-value">${value}</div></div>`}).join("");document.getElementById("modalBody").innerHTML=photos+fields;document.getElementById("plantDialog").showModal()}
["searchInput","priorityFilter","locationFilter","difficultyFilter","statusFilter"].forEach(id=>{document.getElementById(id).addEventListener("input",renderPlants);document.getElementById(id).addEventListener("change",renderPlants)});loadPlants();
</script>
