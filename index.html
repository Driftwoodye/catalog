<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Silveira Botanical Wishlist</title>
<style>
:root{--bg:#0b1220;--panel:#111827;--line:#26354f;--text:#e5e7eb;--muted:#94a3b8;--green:#34d399;--amber:#fbbf24;--danger:#fb7185}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#15382e 0,#0b1220 35%,#07101d 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{background:rgba(7,16,29,.94);border-bottom:1px solid var(--line)}.wrap{max-width:1280px;margin:0 auto;padding:12px 18px}h1{margin:0;color:var(--green);font-size:clamp(22px,3vw,30px);letter-spacing:-.02em}.subtitle{color:var(--muted);font-size:13px;margin-top:2px}.controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}input,select,button{background:#0f172a;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px}input{min-width:min(360px,100%)}input:focus,select:focus{outline:none;border-color:var(--green)}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}.stat{background:rgba(17,24,39,.75);border:1px solid var(--line);border-radius:12px;padding:9px 11px}.stat .num{font-size:20px;font-weight:800}.stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}main{max-width:1280px;margin:0 auto;padding:18px 18px 60px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}.card{background:linear-gradient(180deg,rgba(17,24,39,.97),rgba(15,23,42,.97));border:1px solid var(--line);border-radius:18px;overflow:hidden;min-height:260px;display:flex;flex-direction:column;cursor:pointer}.card:hover{border-color:#3f567a}.card-img{height:160px;background:#0b1220;overflow:hidden;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:#64748b;font-size:12px}.card-img img{width:100%;height:100%;object-fit:cover;display:block}.card-body{padding:15px;display:flex;flex-direction:column;gap:12px;flex:1}.topline{display:flex;justify-content:space-between;gap:10px}.badge{font-size:11px;border:1px solid var(--line);background:#0b1220;border-radius:999px;padding:6px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.family{color:var(--green);border-color:#14532d;background:rgba(6,78,59,.35)}.priority{color:var(--amber);border-color:#78350f;background:rgba(120,53,15,.25)}.name{font-size:20px;font-weight:800;font-style:italic;line-height:1.15}.common{color:var(--muted);font-size:13px;margin-top:3px}.names{color:#708098;font-size:11px;margin-top:3px}.notes{background:#0b1220;border:1px solid rgba(38,53,79,.8);border-radius:12px;padding:10px;font-size:12px;line-height:1.45;color:#cbd5e1;min-height:70px}.mini{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini div{background:#0b1220;border:1px solid rgba(38,53,79,.8);border-radius:12px;padding:9px;min-width:0}.label{display:block;color:#64748b;font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:4px}.value{display:block;font-size:12px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}.chip{font-size:10px;color:#aebbd0;background:#0b1220;border:1px solid rgba(38,53,79,.8);border-radius:999px;padding:5px 7px}.footer{border-top:1px solid rgba(38,53,79,.8);padding-top:10px;display:flex;justify-content:space-between;gap:10px;color:#718096;font-size:11px}.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted);border:1px dashed var(--line);border-radius:18px;background:rgba(17,24,39,.45)}dialog{border:1px solid var(--line);border-radius:20px;background:#0f172a;color:var(--text);max-width:min(980px,94vw);width:980px;padding:0}dialog::backdrop{background:rgba(0,0,0,.65)}.modal-head{padding:18px 20px;background:#111827;border-bottom:1px solid var(--line);border-radius:20px 20px 0 0;display:flex;justify-content:space-between;gap:12px}.modal-body{padding:18px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;max-height:72vh;overflow:auto}.field{background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:10px}.field.full,.photos{grid-column:1/-1}.field-title{color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:6px}.field-value{font-size:13px;color:#e2e8f0;line-height:1.45;word-break:break-word}.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.photo-box{background:#0b1220;border:1px solid var(--line);border-radius:12px;overflow:hidden;min-height:150px;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:12px}.photo-box img{width:100%;height:190px;object-fit:cover}a{color:var(--green)}@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}.modal-body{grid-template-columns:1fr}.photo-grid{grid-template-columns:1fr}input,select{width:100%}}
</style>
</head>
<body>
<header><div class="wrap"><h1>Silveira Botanics</h1><div class="subtitle">Botanical wishlist and collection planning</div><div class="controls"><input id="searchInput" type="search" placeholder="Search name, family, origin, notes..." /><select id="priorityFilter"><option value="all">All priorities</option><option value="5">★★★★★ only</option><option value="4">★★★★ and up</option><option value="3">★★★ and up</option></select><select id="locationFilter"><option value="all">All locations</option></select><select id="difficultyFilter"><option value="all">All difficulties</option></select><select id="statusFilter"><option value="all">All statuses</option></select></div><div class="stats"><div class="stat"><div class="num" id="countAll">—</div><div class="label">Total taxa</div></div><div class="stat"><div class="num" id="countShown">—</div><div class="label">Shown now</div></div><div class="stat"><div class="num" id="countFive">—</div><div class="label">★★★★★</div></div><div class="stat"><div class="num" id="countGreenhouse">—</div><div class="label">Greenhouse</div></div></div><p id="loadStatus" class="subtitle">Loading plants.csv…</p></div></header>
<main><div id="plantsGrid" class="grid"><div class="empty">Loading plants…</div></div></main>
<dialog id="plantDialog"><div class="modal-head"><div><div id="modalBadges"></div><div id="modalTitle" class="name"></div><div id="modalCommon" class="common"></div></div><button onclick="document.getElementById('plantDialog').close()">Close</button></div><div id="modalBody" class="modal-body"></div></dialog>
<script>
const CSV_URL="plants.csv";
let plants=[];let byId=new Map();
const columnMap={id:"Wishlist ID",source:"Source",priority:"Priority",status:"Status",name:"Scientific name",family:"Family",common_en:"Common name EN",common_de:"Common name DE",common_pt:"Common name PT",origin:"Native origin",habitat:"Natural habitat",temp:"Temperature / hardiness target",light:"Light needs",humidity:"Humidity",water:"Water needs",soil:"Soil / substrate",hardiness:"Winter hardiness in Heiligenhaus",difficulty:"Difficulty",location:"Future location",bonsai:"Bonsai potential",invasive:"Invasive potential",pollinators:"Pollinators / ecology",uses:"Edible / medicinal / ethnobotanical",propagation:"Seed source / propagation",buy:"Where to buy EU/UK",wiki:"Wikipedia",powo:"Kew POWO / source search",notes:"Notes",confidence:"Confidence"};
const detailFields=[["id","Wishlist ID"],["source","Source"],["status","Status"],["priority","Priority"],["family","Family"],["common_en","Common name EN"],["common_de","Common name DE"],["common_pt","Common name PT"],["origin","Native origin"],["habitat","Natural habitat"],["temp","Temperature / hardiness target"],["light","Light needs"],["humidity","Humidity"],["water","Water needs"],["soil","Soil / substrate"],["hardiness","Winter hardiness in Heiligenhaus"],["difficulty","Difficulty"],["location","Future location"],["bonsai","Bonsai potential"],["invasive","Invasive potential"],["pollinators","Pollinators / ecology"],["uses","Edible / medicinal / ethnobotanical"],["propagation","Seed source / propagation"],["buy","Where to buy EU/UK"],["wiki","Wikipedia"],["powo","Kew POWO / source search"],["notes","Notes"],["confidence","Confidence"]];
function clean(v){return(v??"").toString().trim()}function escapeHTML(v){return clean(v).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}function countStars(p){return clean(p).split("★").length-1}
function parseCSV(text){const rows=[];let row=[],cell="",q=false;for(let i=0;i<text.length;i++){const ch=text[i],next=text[i+1];if(ch==='"'&&q&&next==='"'){cell+='"';i++}else if(ch==='"'){q=!q}else if(ch===','&&!q){row.push(cell);cell=""}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&next==='\n')i++;row.push(cell);rows.push(row);row=[];cell=""}else{cell+=ch}}row.push(cell);rows.push(row);return rows.filter(r=>r.some(c=>clean(c)))}
function csvToObjects(text){const m=parseCSV(text),h=m[0];return m.slice(1).map(r=>{const o={};h.forEach((x,i)=>o[x]=r[i]??"");return o})}
function transformRows(rows){return rows.map(row=>{const p={};Object.entries(columnMap).forEach(([key,col])=>p[key]=clean(row[col]));p.stars=countStars(p.priority);return p}).filter(p=>p.name&&p.id!=="Wishlist ID")}
async function loadPlants(){try{const res=await fetch(CSV_URL);if(!res.ok)throw new Error("Could not fetch plants.csv: "+res.status);const text=await res.text();plants=transformRows(csvToObjects(text));byId=new Map(plants.map(p=>[p.id,p]));if(!plants.length)throw new Error("plants.csv loaded, but no plant records were found");setupFilters();updateStats();renderPlants();document.getElementById("loadStatus").textContent="Loaded "+plants.length+" plants from plants.csv."}catch(e){console.error(e);document.getElementById("loadStatus").textContent="Could not load plants.csv. Make sure index.html and plants.csv are in the same folder.";document.getElementById("plantsGrid").innerHTML='<div class="empty">Could not load plants.csv.</div>'}}
function uniqueValues(key){return[...new Set(plants.map(p=>p[key]).filter(Boolean))].sort((a,b)=>a.localeCompare(b))}function fillSelect(id,key){const s=document.getElementById(id);uniqueValues(key).forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;s.appendChild(o)})}function setupFilters(){fillSelect("locationFilter","location");fillSelect("difficultyFilter","difficulty");fillSelect("statusFilter","status")}
function updateStats(){document.getElementById("countAll").textContent=plants.length;document.getElementById("countFive").textContent=plants.filter(p=>p.stars===5).length;document.getElementById("countGreenhouse").textContent=plants.filter(p=>p.location.toLowerCase().includes("greenhouse")).length}
function imagePath(p,type){return `images/${p.id}-${type}.jpg`}function imageTag(p,type,label){return `<div class="photo-box"><img src="${imagePath(p,type)}" alt="${escapeHTML(p.name)} ${label}" onerror="this.remove(); this.parentElement.textContent='${label} photo';"></div>`}
function matches(p){const q=document.getElementById("searchInput").value.toLowerCase(),priority=document.getElementById("priorityFilter").value,loc=document.getElementById("locationFilter").value,diff=document.getElementById("difficultyFilter").value,status=document.getElementById("statusFilter").value;const hay=[p.name,p.family,p.common_en,p.common_de,p.common_pt,p.origin,p.habitat,p.location,p.notes,p.buy,p.uses,p.pollinators].join(" ").toLowerCase();return(!q||hay.includes(q))&&(priority==="all"||p.stars>=Number(priority))&&(loc==="all"||p.location===loc)&&(diff==="all"||p.difficulty===diff)&&(status==="all"||p.status===status)}
function renderPlants(){const filtered=plants.filter(matches);document.getElementById("countShown").textContent=filtered.length;if(!filtered.length){document.getElementById("plantsGrid").innerHTML='<div class="empty">No matching plants found.</div>';return}document.getElementById("plantsGrid").innerHTML=filtered.map(p=>`<article class="card" onclick="openPlant('${escapeHTML(p.id)}')"><div class="card-img"><img src="${imagePath(p,"general")}" alt="${escapeHTML(p.name)}" onerror="this.parentElement.remove();"></div><div class="card-body"><div class="topline"><span class="badge family">${escapeHTML(p.family||"—")}</span><span class="badge priority">${escapeHTML(p.priority||"—")}</span></div><div><div class="name">${escapeHTML(p.name)}</div><div class="common">${escapeHTML(p.common_en||"—")}</div><div class="names">🇩🇪 ${escapeHTML(p.common_de||"—")} · 🇵🇹 ${escapeHTML(p.common_pt||"—")}</div></div><div class="notes"><span class="label">Notes</span>${escapeHTML(p.notes||"No notes recorded.")}</div><div class="mini"><div><span class="label">Destination</span><span class="value">${escapeHTML(p.location||"—")}</span></div><div><span class="label">Difficulty</span><span class="value">${escapeHTML(p.difficulty||"—")}</span></div></div><div class="chips"><span class="chip">☀️ ${escapeHTML(p.light||"—")}</span><span class="chip">💧 ${escapeHTML(p.water||"—")}</span><span class="chip">☁️ ${escapeHTML(p.humidity||"—")}</span></div><div class="footer"><span>📍 ${escapeHTML(p.origin||"—")}</span><span>${escapeHTML(p.confidence||"")}</span></div></div></article>`).join("")}
function openPlant(id){const p=byId.get(id);if(!p)return;document.getElementById("modalBadges").innerHTML=`<span class="badge family">${escapeHTML(p.family)}</span> <span class="badge priority">${escapeHTML(p.priority)}</span> <span class="badge">${escapeHTML(p.status)}</span>`;document.getElementById("modalTitle").textContent=p.name;document.getElementById("modalCommon").textContent=`${p.common_en||"—"} · 🇩🇪 ${p.common_de||"—"} · 🇵🇹 ${p.common_pt||"—"}`;const photos=`<div class="photos"><div class="field-title">Identification photos</div><div class="photo-grid">${imageTag(p,"general","General plant")}${imageTag(p,"flower","Flower")}${imageTag(p,"leaf","Leaf")}</div></div>`;const fields=detailFields.map(([key,label])=>{let value=p[key]||"—";if((key==="wiki"||key==="powo")&&value.startsWith("http")){value=`<a href="${escapeHTML(value)}" target="_blank">${escapeHTML(value)}</a>`}else{value=escapeHTML(value)}const full=["habitat","temp","soil","hardiness","pollinators","uses","propagation","buy","notes"].includes(key)?" full":"";return `<div class="field${full}"><div class="field-title">${escapeHTML(label)}</div><div class="field-value">${value}</div></div>`}).join("");document.getElementById("modalBody").innerHTML=photos+fields;document.getElementById("plantDialog").showModal()}
["searchInput","priorityFilter","locationFilter","difficultyFilter","statusFilter"].forEach(id=>{document.getElementById(id).addEventListener("input",renderPlants);document.getElementById(id).addEventListener("change",renderPlants)});loadPlants();
</script>
</body>
</html>
